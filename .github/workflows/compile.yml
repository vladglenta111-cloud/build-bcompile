name: JNI Compiler

on:
  workflow_dispatch:
    inputs:
      ndk_version:
        description: "NDK version (e.g. r25c)"
        required: true
        default: "r25c"
      user_id:
        description: "Telegram user ID"
        required: true
      sources_b64:
        description: "Base64-encoded ZIP with sources"
        required: true

jobs:
  compile:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Decode sources
        run: |
          echo "${{ github.event.inputs.sources_b64 }}" | base64 -d > sources.zip
          unzip -q sources.zip -d sources/

      - name: Check CMakeLists.txt
        run: |
          if [ ! -f sources/CMakeLists.txt ]; then
            echo "❌ CMakeLists.txt не найден!"
            exit 1
          fi

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: ${{ github.event.inputs.ndk_version }}
          add-to-path: true

      - name: Build arm64-v8a
        env:
          NDK: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          cmake \
            -DCMAKE_TOOLCHAIN_FILE=$NDK/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-21 \
            -DCMAKE_BUILD_TYPE=Release \
            -B build/arm64-v8a \
            -S sources/
          cmake --build build/arm64-v8a --config Release

      - name: Build armeabi-v7a
        env:
          NDK: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          cmake \
            -DCMAKE_TOOLCHAIN_FILE=$NDK/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=armeabi-v7a \
            -DANDROID_PLATFORM=android-16 \
            -DCMAKE_BUILD_TYPE=Release \
            -B build/armeabi-v7a \
            -S sources/
          cmake --build build/armeabi-v7a --config Release

      - name: Build x86_64
        env:
          NDK: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          cmake \
            -DCMAKE_TOOLCHAIN_FILE=$NDK/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=x86_64 \
            -DANDROID_PLATFORM=android-21 \
            -DCMAKE_BUILD_TYPE=Release \
            -B build/x86_64 \
            -S sources/
          cmake --build build/x86_64 --config Release

      - name: Collect .so files
        run: |
          mkdir -p output/arm64-v8a output/armeabi-v7a output/x86_64
          find build/arm64-v8a   -name "*.so" -exec cp {} output/arm64-v8a/   \;
          find build/armeabi-v7a -name "*.so" -exec cp {} output/armeabi-v7a/ \;
          find build/x86_64      -name "*.so" -exec cp {} output/x86_64/      \;

      - name: Upload .so artifacts
        uses: actions/upload-artifact@v4
        with:
          name: jni-libs-ndk${{ github.event.inputs.ndk_version }}-user${{ github.event.inputs.user_id }}
          path: output/
          retention-days: 1
